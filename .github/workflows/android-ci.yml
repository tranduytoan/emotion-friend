name: Android CI

# Trigger on every push or pull request targeting the main development branches.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test (Debug)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (matches compileOptions in build.gradle.kts) ─────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Cache Gradle home & build caches to speed up subsequent runs ───
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Make the Gradle wrapper executable (Linux requirement) ─────────
      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      # ── 5. Run unit tests ─────────────────────────────────────────────────
      - name: Run debug unit tests
        working-directory: android-app
        run: ./gradlew testDebugUnitTest --no-daemon

      # ── 6. Assemble the debug APK ─────────────────────────────────────────
      - name: Assemble debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      # ── 7. Upload debug APK so it can be downloaded from the Actions UI ───
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: emotion-friend-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
