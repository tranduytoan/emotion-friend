name: Android CI

on:
  push:
    branches: [ "main", "develop", "feat/**", "fix/**", "ci/**" ]
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"

jobs:
  build:
    name: Build & Test (Debug)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (matches compileOptions in build.gradle.kts) ─────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Cache Gradle home & build caches to speed up subsequent runs ───
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Make the Gradle wrapper executable (Linux requirement) ─────────
      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      # ── 5. Run detekt static analysis ────────────────────────────────────
      - name: Run detekt
        working-directory: android-app
        run: ./gradlew detekt --no-daemon
        # ignoreFailures=true in build.gradle.kts so this step never breaks the build;
        # the HTML/XML report is still uploaded for review.

      # ── 6. Upload detekt report ───────────────────────────────────────────
      - name: Upload detekt report
        if: always()        # Upload even when detekt found issues
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: android-app/app/build/reports/detekt/
          retention-days: 14

      # ── 7. Run unit tests ─────────────────────────────────────────────────
      - name: Run debug unit tests
        working-directory: android-app
        run: ./gradlew testDebugUnitTest --no-daemon

      # ── 8. Upload unit test report ────────────────────────────────────────
      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: android-app/app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      # ── 9. Assemble the debug APK ─────────────────────────────────────────
      - name: Assemble debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      # ── 10. Upload debug APK so it can be downloaded from the Actions UI ──
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: emotion-friend-debug-${{ github.run_number }}
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ============================================================================
  # Release build — triggers on push/PR to main, or any tag v*.*.*
  # Requires GitHub Secrets: KEYSTORE_BASE64, SIGNING_KEY_ALIAS,
  #                          SIGNING_KEY_PASSWORD, SIGNING_STORE_PASSWORD
  # ============================================================================
  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      # Decode keystore from base64 secret and write to file
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/app/release.jks

      # Inject versionCode from run_number so every release has a unique code
      - name: Set version code
        working-directory: android-app
        run: |
          sed -i "s/versionCode = 1/versionCode = ${{ github.run_number }}/" app/build.gradle.kts

      - name: Build release APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon
        env:
          SIGNING_STORE_FILE: release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: emotion-friend-release-${{ github.run_number }}
          path: android-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # Remove keystore from runner immediately after signing
      - name: Clean up keystore
        if: always()
        run: rm -f android-app/app/release.jks
