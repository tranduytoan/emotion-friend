name: Backend CI

# Trigger on every push or pull request targeting the main development branches.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test (Ktor backend)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (matches jvmTarget in backend build.gradle.kts) ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Cache Gradle home & build caches to speed up subsequent runs ───
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-backend-${{ hashFiles('backend-api/**/*.gradle*', 'backend-api/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-backend-

      # ── 4. Make the Gradle wrapper executable (Linux requirement) ─────────
      - name: Grant execute permission for gradlew
        working-directory: backend-api
        run: chmod +x gradlew

      # ── 5. Run unit tests ─────────────────────────────────────────────────
      - name: Run tests
        working-directory: backend-api
        run: ./gradlew test --no-daemon

      # ── 6. Build production fat-jar / distribution ────────────────────────
      - name: Build backend
        working-directory: backend-api
        run: ./gradlew build --no-daemon
