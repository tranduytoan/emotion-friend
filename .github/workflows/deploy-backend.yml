name: Deploy Stack to VPS

on:
  push:
    branches: [ "main" ]
    paths:
      - "deploy/ubuntu-http/**"
      - ".github/workflows/deploy-backend.yml"

  # Allow manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    ${{ secrets.VPS_USER }}
          key:         ${{ secrets.VPS_SSH_KEY }}
          timeout:     120s
          script_stop: true   # abort on first failing command
          script: |
            set -euo pipefail

            echo "==> Navigating to project directory ..."
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            echo "==> Logging in to Docker Hub ..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "==> Pulling latest images ..."
            docker compose pull

            echo "==> Starting containers ..."
            docker compose up -d

            echo "==> Waiting for backend /health check ..."
            attempt=0
            until curl -sf http://localhost/health; do
              attempt=$((attempt + 1))
              if [ $attempt -ge 12 ]; then
                echo "ERROR: Health check timed out after 60s."
                exit 1
              fi
              echo "  ... waiting (attempt $attempt/12)"
              sleep 5
            done

            echo "==> Running smoke tests ..."
            curl -sf http://localhost/api/emotions >/dev/null
            curl -sf http://localhost/admin/scenarios -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" >/dev/null
            echo "  Smoke tests passed."

            echo "==> Cleaning up dangling images ..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps
