name: Deploy Backend to VPS

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend-api/**"
      - "docker-compose.yml"
      - "nginx/**"
      - ".github/workflows/deploy-backend.yml"

  # Allow manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (needed only to read workflow file; actual code is pulled on VPS) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Deploy via SSH ─────────────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    ${{ secrets.VPS_USER }}
          key:         ${{ secrets.VPS_SSH_KEY }}
          timeout:     120s
          script_stop: true   # abort on first failing command
          script: |
            set -euo pipefail

            echo "==> Navigating to project directory ..."
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            # ── Save current image tag for rollback ─────────────────────────
            PREV_BACKEND_IMAGE=$(docker inspect --format='{{.Image}}' emotion_friend_backend 2>/dev/null || echo "")
            echo "==> Previous backend image: ${PREV_BACKEND_IMAGE:-none}"

            echo "==> Pulling latest code from main ..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Stopping running containers ..."
            docker compose down --remove-orphans

            echo "==> Building and starting containers ..."
            if ! docker compose up -d --build; then
              echo "ERROR: docker compose up failed — attempting rollback ..."
              docker compose down --remove-orphans
              git reset --hard HEAD~1
              docker compose up -d
              echo "Rollback completed. Deployment failed."
              exit 1
            fi

            echo "==> Waiting for backend /health check ..."
            attempt=0
            until curl -sf http://localhost/health; do
              attempt=$((attempt + 1))
              if [ $attempt -ge 12 ]; then
                echo "ERROR: Health check timed out after 60s — rolling back ..."
                docker compose down --remove-orphans
                git reset --hard HEAD~1
                docker compose up -d
                echo "Rollback completed. Deployment failed."
                exit 1
              fi
              echo "  ... waiting (attempt $attempt/12)"
              sleep 5
            done

            echo "==> Running smoke test against /api/emotions ..."
            SMOKE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost/api/emotions || echo "000")
            if [ "$SMOKE" != "200" ]; then
              echo "ERROR: Smoke test returned HTTP $SMOKE — rolling back ..."
              docker compose down --remove-orphans
              git reset --hard HEAD~1
              docker compose up -d
              echo "Rollback completed. Deployment failed."
              exit 1
            fi
            echo "  Smoke test passed (HTTP 200)."

            echo "==> Cleaning up dangling images ..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps
