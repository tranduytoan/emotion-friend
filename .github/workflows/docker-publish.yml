name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - 'backend-api/**'
      - 'admin-web/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

jobs:
  publish-backend:
    name: Publish backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: trungnghia2703/emotion-friend
          tags: |
            type=sha,prefix=backend-
            type=raw,value=backend-latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-api
          file: ./backend-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-admin-web:
    name: Publish admin-web image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract admin-web metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: trungnghia2703/emotion-friend
          tags: |
            type=sha,prefix=admin-web-
            type=raw,value=admin-web-latest,enable={{is_default_branch}}

      - name: Build and push admin-web image
        uses: docker/build-push-action@v6
        with:
          context: ./admin-web
          file: ./admin-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}