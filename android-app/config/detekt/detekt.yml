  UnnecessaryParentheses:
    active: false
  UntilInsteadOfRangeTo:
    active: false
  UnusedImports:
    active: true
  UnusedParameter:
    active: false
  UnusedPrivateClass:
    active: true
  UnusedPrivateMember:
    active: false           # Hilt generates members that appear unused
  UnusedPrivateProperty:
    active: false
  UseAnyOrNoneInsteadOfFind:
    active: true
  UseArrayLiteralsInAnnotations:
