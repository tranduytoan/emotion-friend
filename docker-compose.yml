# =============================================================================
# Emotion Friend — Production Docker Compose
# =============================================================================
# Services : mysql · backend · nginx
# Usage    : docker compose --env-file .env up -d --build
# =============================================================================

services:

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: emotion_friend_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-emotion_friend}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ktor Backend (backend-api) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: emotion_friend_backend
    restart: unless-stopped
    environment:
      PORT:              8080
      DATABASE_URL:      jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-emotion_friend}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USER:     ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: emotion_friend_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
